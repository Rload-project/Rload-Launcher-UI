<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">

    <defs>
      <linearGradient id="bg-violet_horizon" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1c1836"/>
        <stop offset="100%" stop-color="#100d24"/>
      </linearGradient>
      <linearGradient id="vig-violet_horizon" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
        <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
      </linearGradient>
      <radialGradient id="focus-violet_horizon" cx="70%" cy="45%" r="60%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
    </defs>
    <rect width="1600" height="500" fill="url(#bg-violet_horizon)"/>
    <rect width="1600" height="500" fill="url(#focus-violet_horizon)"/>
  

    <ellipse cx="1150" cy="380" rx="500" ry="180" fill="#3B82F6" opacity="0.10"/>
    <ellipse cx="1200" cy="360" rx="320" ry="110" fill="#EC4899" opacity="0.08"/>
    <line x1="500" y1="360" x2="1600" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
<rect width="1600" height="500" fill="url(#vig-violet_horizon)"/>
</svg>
